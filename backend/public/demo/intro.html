<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casual Funnel - User Analytics Application</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 3rem 2rem;
      border: 1px solid #334155;
      background-color: #1e293b;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 2.75rem;
      font-weight: 800;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.025em;
      color: #3b82f6;
    }
    .subtitle {
      font-size: 1.5rem;
      color: #e2e8f0;
      font-weight: 500;
      margin-bottom: 2rem;
    }
    .assignment {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 3rem;
      border-top: 1px solid #334155;
      padding-top: 1.5rem;
    }
    .tech-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }
    .tech {
      font-size: 0.95rem;
      font-weight: 600;
      color: #3b82f6;
      background-color: #1e293b;
      padding: 0.5rem 1rem;
      border: 1px solid #334155;
      border-radius: 9999px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Casual Funnel</h1>
    <div class="subtitle">User Analytics Application</div>
    <div class="assignment">Full Stack Engineer Assignment</div>
    <div class="tech-label">Tech Stack</div>
    <div class="tech">React &bull; Node.js &bull; Express &bull; MongoDB Atlas</div>
  </div>
</body>
</html>
